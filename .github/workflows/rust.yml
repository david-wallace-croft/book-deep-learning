name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # - name: Cache Torch
      #   id: cache-torch
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/pip
      #     key: ${{ runner.os }}-pip-torch
      # - name: Install Torch
      #   # if: steps.cache-torch.outputs.cache-hit != 'true'
      #   run: |
      #     pip3 install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      #     echo "LD_LIBRARY_PATH=$(python -c 'import torch; print(torch._C._where_if_exists("lib"))'):$LD_LIBRARY_PATH" >> $GITHUB_ENV
      #     echo "LIBTORCH=$(python -c 'import torch; print(torch.utils.cmake_prefix_path)')" >> $GITHUB_ENV
      - name: Install Torch
        run: |
          # Get the base path of the torch installation
          TORCH_PATH=$(python -c 'import torch; import os; print(os.path.dirname(torch.__file__))')
          
          # Set LIBTORCH and update LD_LIBRARY_PATH
          echo "LIBTORCH=$TORCH_PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$TORCH_PATH/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "LIBTORCH_USE_PYTORCH=1" >> $GITHUB_ENV
          
          # Also helpful for some older versions of tch-rs
          echo "C_INCLUDE_PATH=$TORCH_PATH/include:$TORCH_PATH/include/torch/csrc/api/include" >> $GITHUB_ENV
      # - name: Show Location
      #   run: python -m pip show torch
      # - name: Show Location 2
      #   run: ls -Flatr /home/runner/.local/lib/python3.12/site-packages/torch/lib
      # - name: Set Environment Variable
      #   run: echo "LIBTORCH_USE_PYTORCH=1" >> $GITHUB_ENV
      # - name: Set Environment Variable 2
      #   run: echo "export LD_LIBRARY_PATH=/home/runner/.local/lib/python3.12/site-packages/torch/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      - name: Build
        run: cargo build --all --verbose
      - name: Run tests
        run: cargo test --all --verbose
