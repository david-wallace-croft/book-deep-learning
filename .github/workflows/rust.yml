name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # - name: Cache Torch
      #   id: cache-torch
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/pip
      #     key: ${{ runner.os }}-pip-torch
      - name: Install Torch
        # if: steps.cache-torch.outputs.cache-hit != 'true'
        run: pip3 install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Show Location
        run: python -m pip show torch
      - name: Show Location 2
        run: ls -Flatr /home/runner/.local/lib/python3.12/site-packages/torch
      - name: Set Environment Variable
        run: echo "LIBTORCH_USE_PYTORCH=1" >> $GITHUB_ENV
      - name: Set Environment Variable 2
        run: echo "export LD_LIBRARY_PATH=/home/runner/.local/lib/python3.12/site-packages/torch/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      - name: Build
        run: cargo build --all --verbose
      - name: Run tests
        run: cargo test --all --verbose
