name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    # runs-on: ubuntu-latest
    runs-on: pytorch/pytorch

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Cache Torch
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-venv-torch-2.11
      - name: Download Torch
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate

          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Set Environment
        run: |
          source .venv/bin/activate
          TORCH_PATH=$(python -c 'import torch; import os; print(os.path.dirname(torch.__file__))')
          
          echo "LIBTORCH=$TORCH_PATH"
          echo "LIBTORCH=$TORCH_PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$TORCH_PATH/lib:$LD_LIBRARY_PATH"
          echo "LD_LIBRARY_PATH=$TORCH_PATH/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "LIBTORCH_USE_PYTORCH=1"
          echo "LIBTORCH_USE_PYTORCH=1" >> $GITHUB_ENV
      - name: Build
        run: |
          source .venv/bin/activate
          cargo build --all --verbose
      - name: Run tests
        run: |
          cargo test --all --verbose
