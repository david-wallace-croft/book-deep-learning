name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # 1. Cache LibTorch to speed up subsequent runs
      - name: Cache LibTorch
        id: cache-libtorch
        uses: actions/cache@v4
        with:
          path: libtorch
          key: ${{ runner.os }}-libtorch-2.1.0 # Update version as needed
      # 2. Download and unzip only if cache miss
      - name: Download LibTorch
        if: steps.cache-libtorch.outputs.cache-hit != 'true'
        run: |
          wget https://download.pytorch.org/libtorch/cpu/libtorch-shared-with-deps-2.1.0%2Bcpu.zip -O libtorch.zip
          unzip libtorch.zip
          rm libtorch.zip
      # 3. Set Environment Variables
      - name: Set Environment Variables
        run: |
          echo "Torch_DIR=${{ github.workspace }}/libtorch/share/cmake/Torch" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/libtorch/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
      # 4. Build your project
      - name: Configure and Build
        run: |
          mkdir build && cd build
          cmake -DCMAKE_PREFIX_PATH=$Torch_DIR ..
          cmake --build .
      - name: Build
        run: cargo build --all --verbose
      - name: Run tests
        run: cargo test --all --verbose
